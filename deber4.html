<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #f0f0f0;
        }
        
        .calculadora {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        
        button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        .resultado {
            margin-top: 20px;
            padding: 10px;
            background-color: #e3f2fd;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            color: #1976d2;
        }
        
        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        
        .video-container {
            margin-top: 30px;
            text-align: center;
        }
        
        .video-container iframe {
            width: 100%;
            height: 200px;
            border: none;
            border-radius: 5px;
        }
        
        h3 {
            text-align: center;
            color: #333;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="calculadora">
        <h2 style="text-align: center;">Calculadora Básica</h2>
        
        <label>Número 1:</label>
        <input type="number" id="num1" placeholder="Ingrese el primer número">
        
        <label>Número 2:</label>
        <input type="number" id="num2" placeholder="Ingrese el segundo número">
        
        <button onclick="realizarOperacion('suma')">Sumar</button>
        <button onclick="realizarOperacion('resta')">Restar</button>
        <button onclick="realizarOperacion('multiplicacion')">Multiplicar</button>
        <button onclick="realizarOperacion('division')">Dividir</button>
        
        <div id="resultado" class="resultado"></div>
        <div id="error" class="error"></div>
    </div>
    
    <!-- Video 2 - Movido fuera de la calculadora y del script -->
    <h3>Video Tutorial</h3>
    <div class="video-container">
        <iframe src="https://drive.google.com/file/d/1ggV9OeEjF5ABfCDXulE9xqUoBcgu4MKw/preview" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
        </iframe>
    </div>

    <script>
        function realizarOperacion(tipo) {
            // Limpiar mensajes anteriores
            document.getElementById('error').textContent = '';
            
            // Obtener valores
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const resultadoDiv = document.getElementById('resultado');
            
            // Validar que sean números válidos
            if (isNaN(num1) || isNaN(num2)) {
                document.getElementById('error').textContent = 'Error: Ingrese números válidos';
                resultadoDiv.textContent = '';
                return;
            }
            
            let resultado;
            let operacion;
            
            // Realizar operación según el tipo
            switch(tipo) {
                case 'suma':
                    resultado = num1 + num2;
                    operacion = 'Suma';
                    break;
                case 'resta':
                    resultado = num1 - num2;
                    operacion = 'Resta';
                    break;
                case 'multiplicacion':
                    resultado = num1 * num2;
                    operacion = 'Multiplicación';
                    break;
                case 'division':
                    if (num2 === 0) {
                        document.getElementById('error').textContent = 'Error: No se puede dividir por cero';
                        resultadoDiv.textContent = '';
                        return;
                    }
                    resultado = num1 / num2;
                    operacion = 'División';
                    break;
                default:
                    return;
            }
            
            // Mostrar resultado
            resultadoDiv.textContent = `${operacion}: ${num1} ${obtenerSimbolo(tipo)} ${num2} = ${resultado}`;
        }
        
        function obtenerSimbolo(tipo) {
            switch(tipo) {
                case 'suma': return '+';
                case 'resta': return '-';
                case 'multiplicacion': return '×';
                case 'division': return '÷';
                default: return '';
            }
        }
        
        // Permitir usar la tecla Enter
        document.getElementById('num1').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                realizarOperacion('suma');
            }
        });
        
        document.getElementById('num2').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                realizarOperacion('suma');
            }
        });
    </script>
</body>
</html>
